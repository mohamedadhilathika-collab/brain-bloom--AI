<!DOCTYPE html>
<html>

<head>

<title>Ramanujan Maths Expert</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#08142b;
color:white;
}

.container{
padding:20px;
}

h1{
text-align:center;
}

#chat{
margin-top:20px;
height:60vh;
overflow:auto;
background:#13254d;
padding:15px;
border-radius:15px;
}

.input-area{
display:flex;
gap:10px;
margin-top:15px;
}

input{
flex:1;
padding:14px;
border:none;
border-radius:12px;
}

button{
padding:14px 20px;
border:none;
border-radius:12px;
background:#ff1493;
color:white;
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<h1>Ramanujan Maths Expert</h1>

<div id="chat"></div>

<div class="input-area">

<input
id="question"
placeholder="Ask your maths question">

<button onclick="sendMessage()">
Send
</button>

</div>

</div>

<script>

async function sendMessage(){

const input =
document.getElementById("question");

const chat =
document.getElementById("chat");

const message =
input.value;

if(!message) return;

chat.innerHTML +=
"<p><b>You:</b> " +
message +
"</p>";

input.value = "";

const response =
await fetch("/chat/maths",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message
})

});

const data =
await response.json();

chat.innerHTML +=
"<p><b>Ramanujan:</b> " +
data.reply +
"</p>";

}

</script>

</body>

</html>
