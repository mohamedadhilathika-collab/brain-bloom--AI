<!DOCTYPE html>
<html>

<head>

  <title>English AI Tutor</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    body{
      margin:0;
      font-family:Arial;
      background:#07152E;
      color:white;
      display:flex;
      flex-direction:column;
      height:100vh;
    }

    .top{
      background:#EC4899;
      padding:20px;
      font-size:28px;
      font-weight:bold;
    }

    .chat{
      flex:1;
      overflow-y:auto;
      padding:20px;
    }

    .message{
      background:#1E293B;
      padding:16px;
      border-radius:20px;
      margin-bottom:20px;
      line-height:1.7;
    }

    .user{
      background:#4F46E5;
    }

    .bottom{
      display:flex;
      gap:10px;
      padding:20px;
    }

    input{
      flex:1;
      padding:14px;
      border:none;
      border-radius:14px;
      outline:none;
      font-size:16px;
    }

    button{
      background:#EC4899;
      color:white;
      border:none;
      padding:14px 24px;
      border-radius:14px;
      font-weight:bold;
      cursor:pointer;
    }

  </style>

</head>

<body>

  <div class="top">
    📘 English AI Tutor
  </div>

  <div class="chat" id="chat">

    <div class="message">
      Hello 👋 I am your English AI tutor.
    </div>

  </div>

  <div class="bottom">

    <input
      id="input"
      placeholder="Ask English doubts..."
    >

    <button onclick="sendMessage()">
      Send
    </button>

  </div>

  <script>

    async function sendMessage(){

      const input = document.getElementById("input");

      const chat = document.getElementById("chat");

      const message = input.value;

      if(!message) return;

      chat.innerHTML += `
        <div class="message user">
          <b>You</b><br><br>
          ${message}
        </div>
      `;

      input.value = "";

      chat.innerHTML += `
        <div class="message" id="loading">
          English Tutor is typing...
        </div>
      `;

      chat.scrollTop = chat.scrollHeight;

      const response = await fetch("/chat", {

        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({
          message:message,
          subject:"english"
        })

      });

      const data = await response.json();

      document.getElementById("loading").remove();

      chat.innerHTML += `
        <div class="message">
          <b>English Tutor</b><br><br>
          ${data.reply}
        </div>
      `;

      chat.scrollTop = chat.scrollHeight;
    }

  </script>

</body>

</html>
