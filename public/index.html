<!DOCTYPE html>
<html>

<head>

  <title>BrainBloom AI</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    body{
      margin:0;
      background:#0F172A;
      font-family:Arial;
      color:white;
      padding:20px;
    }

    h1{
      text-align:center;
      margin-top:50px;
      font-size:50px;
    }

    p{
      text-align:center;
      color:#CBD5E1;
      font-size:20px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      margin-top:50px;
    }

    .card{
      padding:30px;
      border-radius:25px;
    }

    .english{
      background:#EC4899;
    }

    .science{
      background:#06B6D4;
    }

    .social{
      background:#10B981;
    }

    .maths{
      background:#F97316;
    }

    button{
      margin-top:20px;
      border:none;
      padding:14px 20px;
      border-radius:14px;
      font-weight:bold;
      cursor:pointer;
    }

  </style>

</head>

<body>

  <h1>BrainBloom AI</h1>

  <p>
    Learn anything with your AI tutor.
  </p>

  <div class="grid">

    <div class="card english">
      <h2>📘 English</h2>
      <p>English AI tutor</p>

      <button>
        Start Learning
      </button>
    </div>

    <div class="card science">
      <h2>🧪 Science</h2>
      <p>Science AI tutor</p>

      <button>
        Start Learning
      </button>
    </div>

    <div class="card social">
      <h2>🌍 Social Studies</h2>
      <p>Social AI tutor</p>

      <button>
        Start Learning
      </button>
    </div>

    <div class="card maths">
      <h2>🧮 Mathematics</h2>
      <p>Math AI tutor</p>

      <button>
        Start Learning
      </button>
    </div>

  </div>

</body>

</html>
