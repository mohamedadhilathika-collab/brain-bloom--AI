<!DOCTYPE html>
<html>

<head>

<title>BrainBloom Login</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:#08142b;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#13254d;
padding:30px;
border-radius:20px;
width:320px;
}

h1{
text-align:center;
color:#ff1493;
}

input{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
box-sizing:border-box;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:12px;
background:#ff1493;
color:white;
font-size:18px;
}

</style>

</head>

<body>

<div class="box">

<h1>BrainBloom Login</h1>

<input
id="username"
placeholder="Username">

<input
id="realname"
placeholder="Real Name">

<input
id="Email"
placeholder="Email">

<input
id="Mail's password"
placeholder="Mail's password">

<button onclick="login()">
Login
</button>

</div>

<script>

async function login(){

window.location.href="/index.html";

}

</script>

</body>

</html>
