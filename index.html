<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrainBloom AI</title>

  <style>

    body{
      margin:0;
      font-family:Arial;
      background:#020b24;
      color:white;
      text-align:center;
    }

    h1{
      padding-top:40px;
      font-size:40px;
      color:#ff2ea6;
    }

    p{
      color:#cccccc;
      margin-bottom:40px;
    }

    .container{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
      gap:20px;
      padding:20px;
      max-width:700px;
      margin:auto;
    }

    .card{
      background:linear-gradient(135deg,#5f2eff,#ff2ea6);
      padding:40px 20px;
      border-radius:25px;
      font-size:24px;
      font-weight:bold;
      text-decoration:none;
      color:white;
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.05);
    }

  </style>

</head>

<body>

  <h1>BrainBloom AI</h1>

  <p>Select a subject to start learning</p>

  <div class="container">

    <a class="card" href="english.html">
      English
    </a>

    <a class="card" href="science.html">
      Science
    </a>

    <a class="card" href="social.html">
      Social
    </a>

    <a class="card" href="maths.html">
      Maths
    </a>

  </div>

<script>

fetch("/device-check");

</script>

</body>
</html>
